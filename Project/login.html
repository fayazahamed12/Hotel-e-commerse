<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="../CSS/login.css">
</head>
<body>

    <div id="lpar1">
        <div id="lpar">
            <a href="./signin.html" id="back-btn">&leftarrow;</a>
            <h1>Welcome Back!</h1>
            <p class="subtitle">Login to continue to your account</p>
            <form id="login-form">
                <input type="email" placeholder="Email Address" required><br><br>
                <input type="password" placeholder="Password" required>
                <p class="forget"><a href="#">Forgot Password?</a></p>
                <button type="submit">Log in</button>
            </form>
            <p class="signup-text">
                Not a member? <a href="./signin.html">Create an account</a>
            </p>
        </div>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            localStorage.setItem('isLoggedIn', 'true');
            window.location.href = './cart.html';
        });
    </script>
</body>
</html>
