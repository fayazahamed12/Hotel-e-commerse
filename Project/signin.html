<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SignIn</title>
    <link rel="stylesheet" href="../CSS/signin.css" />
  </head>
  <body>
    <div id="parent">
      <div id="child">
        <div id="sup">
          <a href="./index.html">&leftarrow;</a>
          <h1 id="signup">Sign up</h1>
          <br />
          <input
            type="text"
            title="Enter your FirstName"
            placeholder="First Name"
            required
          />&emsp;&emsp;
          <input
            type="text"
            id="lname"
            title="Enter your LastName"
            placeholder="Last Name"
            required
          /><br /><br />
          <input
            class="len"
            type="email"
            title="Enter your email address"
            placeholder="Email Address"
            name="email"
            required
          /><br /><br />
          <input
            class="len"
            type="Password"
            title="Enter your Password"
            placeholder="Password"
            required
          /><br /><br />
          <input
            class="len"
            type="Password"
            title="Enter your Password again"
            placeholder="Confirm Password"
            required
          /><br /><br />
          <p>
            <input type="checkbox" />&nbsp;&nbsp;Agreed to Terms and Conditions
          </p>
          <br />
          <a href="./login.html"><button>Register</button><br /></a>
          <p id="lo">Already a member? <a href="./login.html">Log in</a></p>
        </div>
        <div id="simg"><img src="../Images/signin.jpg" alt="" /></div>
      </div>
      <div id="lastchild"></div>
    </div>
  </body>
</html>
